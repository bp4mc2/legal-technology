# Assistent runtime configuratie
# Gebruik deze file voor Docker/Ollama model instellingen
[assistant]
provider = docker
docker_model_url = http://localhost:12434
docker_model_name = ai/smollm2:360M-Q4_K_M
fallback_ollama = false
ollama_url = http://localhost:11434/api/generate
ollama_model = mistral
timeout = 300
max_tokens = 220
