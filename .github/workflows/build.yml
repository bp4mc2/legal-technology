name: Build ReSpec Document

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install rdflib jinja2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # Als je package-lock.json hebt: gebruik npm ci (sneller/strikter)
      - name: Install Node deps
        run: |
          npm ci

      # Playwright gebruikt Chromium voor PDF. Installeer Chromium in CI. [2](https://respec.org/docs/src.html)
      - name: Install Playwright Chromium
        run: |
          npx playwright install --with-deps chromium

      - name: Generate documentation sources (into build/docs)
        run: |
          python tools/generate_respec.py

      - name: Build static HTML pages (ReSpec snapshots)
        run: |
          mkdir -p dist dist/assets
          find dist -maxdepth 1 -name '*.html' -delete
          rm -rf dist/site
          for src in build/docs/respec/*.html; do
            out="dist/$(basename "$src")"
            npx respec \
              --src "$src" \
              --out "$out" \
              --localhost \
              --use-local \
              --timeout 60 \
              --verbose
          done
          cp -R build/docs/assets/. dist/assets/

      # PDF maken via Playwright van dist/index.html (statisch).
      - name: Build PDF (Playwright)
        run: |
          node tools/pdf.js

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: respec-output
          path: dist

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist