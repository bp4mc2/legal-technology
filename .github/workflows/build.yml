name: Build ReSpec Document

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install rdflib jinja2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # Als je package-lock.json hebt: gebruik npm ci (sneller/strikter)
      - name: Install Node deps
        run: |
          npm ci

      # Playwright gebruikt Chromium voor PDF. Installeer Chromium in CI. [2](https://respec.org/docs/src.html)
      - name: Install Playwright Chromium
        run: |
          npx playwright install --with-deps chromium

      - name: Generate Markdown (into media/)
        run: |
          python tools/generate_respec.py

      # ReSpec CLI maakt statische snapshot.
      # --localhost + relatieve src is belangrijk. [1](https://github.com/speced/respec/issues/4695)
      - name: Build static HTML (ReSpec snapshot)
        run: |
          mkdir -p dist
          npx respec \
            --src media/index.html \
            --out dist/index.html \
            --localhost \
            --use-local \
            --timeout 60 \
            --verbose

      # PDF maken via Playwright van dist/index.html (statisch). [2](https://respec.org/docs/src.html)[4](https://github-wiki-see.page/m/gnab/remark/wiki/configuration)
      - name: Build PDF (Playwright)
        run: |
          node tools/pdf.js

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: respec-output
          path: dist

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist